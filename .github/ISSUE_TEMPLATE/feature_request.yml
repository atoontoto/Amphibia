name: Feature request
description: Propose a scoped Amphibia improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: Describe the problem before proposing an implementation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Compatibility, real-time, privacy, security, or licensing impact
  - type: checkboxes
    id: provider
    attributes:
      label: External services
      options:
        - label: This proposal does not assume undocumented or unauthorized access to TONE3000 or another provider.
          required: true
