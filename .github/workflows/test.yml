name: Repository checks

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  identity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.x"
      - name: Validate product identity
        run: python tests/identity/validate_identity.py
      - name: Compile Python checks
        run: python -m compileall -q tests
